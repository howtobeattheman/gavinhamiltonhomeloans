<!DOCTYPE html>
<html>
<head><title>Zapier Test</title></head>
<body>
<h2>Zapier Webhook Test</h2>
<button onclick="testZapier()">Send Test to Zapier</button>
<div id="status" style="margin-top:20px;font-size:16px"></div>
<script>
function testZapier() {
  document.getElementById('status').textContent = 'Sending...';
  const data = new URLSearchParams({
    fullName: 'Test User',
    email: 'test@test.com',
    phone: '5035550100',
    page: 'Test Page',
    purchasePrice: '500000',
    downPayment: '20%',
    interestRate: '6.75%'
  });
  const xhr = new XMLHttpRequest();
  xhr.open('POST', 'https://hooks.zapier.com/hooks/catch/27867937/43s1ofr/', true);
  xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
  xhr.onload = function() {
    document.getElementById('status').textContent = 'Response: ' + xhr.status + ' - ' + xhr.responseText.substring(0, 100);
  };
  xhr.onerror = function() {
    document.getElementById('status').textContent = 'ERROR: Network request failed';
  };
  xhr.send(data.toString());
}
</script>
</body>
</html>
